<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>間 — a quiet shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --washi:#f3efe6;        /* off-white washi paper */
    --washi-deep:#ebe5d8;
    --sumi:#23211c;         /* sumi ink */
    --sumi-soft:#6b665b;
    --faint:#a39c8c;
    --clay:#9c6b4f;         /* muted clay accent */
    --indigo:#3b4a5a;
    --line:#cdc6b6;
    --serif:"Noto Serif","Noto Serif SC","Songti SC",Georgia,serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--washi);color:var(--sumi);font-family:var(--serif);font-weight:400;
    font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(rgba(120,110,90,.035) 1px,transparent 1px);
    background-size:4px 4px;
  }
  ::selection{background:var(--clay);color:var(--washi)}
  a{color:var(--clay);text-decoration:none}
  button{font-family:inherit;cursor:pointer;color:inherit}

  .enso{display:inline-block;border-radius:50%;border:2px solid var(--sumi);
        border-right-color:transparent;border-bottom-color:rgba(35,33,28,.4);transform:rotate(-28deg)}

  /* header */
  header.top{padding:30px 0 0}
  .topin{max-width:1080px;margin:0 auto;padding:0 36px;display:flex;align-items:center;gap:18px}
  .mark{display:flex;align-items:center;gap:14px;cursor:pointer}
  .mark .e{width:30px;height:30px;border-radius:50%;border:1.6px solid var(--sumi);border-right-color:transparent;transform:rotate(-30deg)}
  .mark .nm{font-size:15px;letter-spacing:.5em;font-weight:400}
  .mark .nm small{letter-spacing:.18em;color:var(--sumi-soft);font-size:11px;display:block;margin-top:2px;letter-spacing:.3em}
  .crumb{margin-left:auto;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--faint)}

  .wrap{max-width:1080px;margin:0 auto;padding:0 36px 140px}

  /* library hero */
  .hero{padding:90px 0 64px;position:relative}
  .hero .big-enso{position:absolute;right:2%;top:40px;width:160px;height:160px;border:2px solid var(--sumi);
        border-radius:50%;border-right-color:transparent;border-top-color:rgba(35,33,28,.55);transform:rotate(-20deg);opacity:.14;pointer-events:none}
  .hero h1{font-weight:300;font-size:clamp(30px,5vw,52px);line-height:1.25;letter-spacing:.02em;margin:0;max-width:18ch}
  .hero h1 .jp{font-weight:400}
  .hero .sub{margin-top:28px;color:var(--sumi-soft);font-weight:300;font-size:15px;max-width:46ch;line-height:1.9}
  .hero .count{margin-top:34px;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--faint)}

  /* filter */
  .filters{display:flex;flex-wrap:wrap;gap:26px;margin:18px 0 0;padding:30px 0;border-top:1px solid var(--line)}
  .filters button{background:none;border:none;font-family:var(--serif);font-size:13px;letter-spacing:.16em;
        color:var(--faint);font-weight:300;padding:0;position:relative;transition:color .4s}
  .filters button:hover{color:var(--sumi)}
  .filters button[aria-pressed="true"]{color:var(--sumi)}
  .filters button[aria-pressed="true"]::before{content:"";position:absolute;left:50%;top:-14px;width:4px;height:4px;
        background:var(--clay);border-radius:50%;transform:translateX(-50%)}
  .filters button .n{font-size:10px;color:var(--faint);margin-left:5px;vertical-align:super}

  /* category sections */
  .catsec{margin-top:70px}
  .catsec-head{display:flex;align-items:baseline;gap:20px;margin-bottom:40px}
  .catsec-head h2{font-weight:300;font-size:clamp(20px,2.6vw,30px);margin:0;letter-spacing:.06em}
  .catsec-head .tl{font-size:12px;color:var(--faint);font-weight:300;font-style:italic}
  .catsec-head .ix{margin-left:auto;font-size:11px;letter-spacing:.3em;color:var(--faint)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(208px,1fr));gap:64px 44px}
  .card{cursor:pointer;background:none;border:none;padding:0;font-family:inherit;color:inherit;text-align:left;display:flex;flex-direction:column}
  .cover{
    aspect-ratio:5/7;background:var(--washi-deep);position:relative;overflow:hidden;
    display:flex;flex-direction:column;justify-content:flex-end;padding:26px 22px;
    box-shadow:0 1px 0 rgba(0,0,0,.04);transition:transform .6s cubic-bezier(.2,.7,.2,1),box-shadow .6s;
    border:1px solid var(--line);
  }
  .card:hover .cover{transform:translateY(-6px);box-shadow:0 22px 40px -28px rgba(35,33,28,.5)}
  .card:focus-visible .cover{outline:1px solid var(--clay);outline-offset:4px}
  /* minimal ink mark motifs per category */
  .ink{position:absolute;pointer-events:none}
  .ink.enso-mark{top:24px;left:22px;width:46px;height:46px;border:1.6px solid var(--sumi);border-radius:50%;
        border-right-color:transparent;transform:rotate(-25deg);opacity:.85}
  .m-mystery .ink.enso-mark{border-radius:50%;border:1.6px solid var(--sumi);border-top-color:transparent;border-left-color:transparent}
  .m-scifi .ink.enso-mark{width:10px;height:10px;background:var(--sumi);border:none;border-radius:50%;box-shadow:18px 6px 0 -2px var(--clay),34px -4px 0 -4px var(--sumi)}
  .m-philosophy .ink.enso-mark{border:none;border-radius:0;width:2px;height:48px;background:var(--sumi);transform:none}
  .m-poetry .ink.enso-mark{border:none;border-radius:0;width:40px;height:2px;background:var(--sumi);box-shadow:0 10px 0 0 var(--clay)}
  .cover .c-title{font-weight:400;font-size:clamp(17px,2.1vw,21px);line-height:1.35;letter-spacing:.02em;z-index:2}
  .cover .c-author{font-size:11px;color:var(--sumi-soft);letter-spacing:.1em;margin-top:10px;font-style:italic;z-index:2}
  .cover .c-seal{position:absolute;bottom:22px;right:22px;width:22px;height:22px;border:1px solid var(--clay);
        color:var(--clay);font-size:10px;display:flex;align-items:center;justify-content:center;z-index:2}
  .card .c-meta{margin-top:16px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint)}

  /* detail */
  .detail{padding-top:60px}
  .det-grid{display:grid;grid-template-columns:260px 1fr;gap:80px;align-items:start}
  .det-cover .cover{aspect-ratio:5/7}
  .det-main .cat{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--clay);margin-bottom:24px}
  .det-main h1{font-weight:300;font-size:clamp(28px,4.4vw,48px);line-height:1.18;margin:0 0 .35em;letter-spacing:.02em}
  .det-main .by{font-style:italic;color:var(--sumi-soft);font-size:15px;margin-bottom:34px}
  .det-main .blurb{font-weight:300;font-size:17px;line-height:1.95;color:#3a372f;max-width:42ch;margin:0 0 40px}
  .det-facts{display:flex;gap:48px;margin-bottom:44px}
  .det-facts .k{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .det-facts .v{font-weight:300;font-size:24px}
  .startbtn{display:inline-flex;align-items:center;gap:14px;background:none;border:1px solid var(--sumi);
        padding:15px 32px;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--sumi);
        transition:background .5s,color .5s;font-weight:300}
  .startbtn:hover{background:var(--sumi);color:var(--washi)}
  .startbtn .e{width:14px;height:14px;border-radius:50%;border:1.4px solid currentColor;border-right-color:transparent;transform:rotate(-25deg)}

  .contents{margin-top:84px}
  .contents .ch-head{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--faint);margin-bottom:30px;
        display:flex;align-items:center;gap:18px}
  .contents .ch-head::after{content:"";flex:1;border-top:1px solid var(--line)}
  .chrow{display:flex;align-items:baseline;gap:24px;width:100%;text-align:left;background:none;border:none;
        padding:22px 0;font-family:inherit;color:inherit;border-bottom:1px solid var(--line);transition:padding-left .5s}
  .chrow:hover{padding-left:14px}
  .chrow .cn{font-size:12px;color:var(--clay);letter-spacing:.1em;min-width:26px}
  .chrow .ct{flex:1;font-weight:300;font-size:18px;letter-spacing:.02em}
  .chrow .cty{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint)}
  .chrow .ar{color:var(--clay);opacity:0;transition:opacity .5s}
  .chrow:hover .ar{opacity:1}
  .backlink{display:inline-block;margin-top:56px;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--faint)}
  .backlink:hover{color:var(--sumi)}

  /* reader */
  .reader{padding-top:30px}
  .rbar{position:sticky;top:0;z-index:30;background:linear-gradient(var(--washi) 70%,rgba(243,239,230,0));
        display:flex;align-items:center;gap:22px;flex-wrap:wrap;padding:18px 0 22px}
  .rbar .lnk{background:none;border:none;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);font-weight:300}
  .rbar .lnk:hover{color:var(--sumi)}
  .rbar select{font-family:var(--serif);font-size:13px;background:none;border:none;border-bottom:1px solid var(--line);
        color:var(--sumi);padding:5px 18px 5px 2px;max-width:46vw;font-weight:300;
        -webkit-appearance:none;appearance:none;
        background-image:linear-gradient(45deg,transparent 50%,var(--faint) 50%),linear-gradient(135deg,var(--faint) 50%,transparent 50%);
        background-position:calc(100% - 8px) 12px,calc(100% - 3px) 12px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
  .rbar .spacer{flex:1}
  .rbar .fs{display:flex;align-items:center;gap:18px}
  .rbar .fs button{background:none;border:none;color:var(--faint);font-weight:300}
  .rbar .fs button:hover{color:var(--sumi)}
  .rbar .fs .s{font-size:13px}.rbar .fs .l{font-size:19px}

  .scroll{max-width:640px;margin:0 auto;padding-top:40px}
  .scroll .s-cat{text-align:center;font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--clay);margin-bottom:26px}
  .scroll h2{font-weight:300;font-size:clamp(24px,4vw,40px);text-align:center;line-height:1.3;margin:0 0 16px;letter-spacing:.03em}
  .scroll .s-book{text-align:center;font-style:italic;color:var(--sumi-soft);font-size:14px;margin-bottom:42px}
  .scroll .s-enso{display:block;width:38px;height:38px;border:1.6px solid var(--sumi);border-radius:50%;
        border-right-color:transparent;border-bottom-color:rgba(35,33,28,.4);transform:rotate(-26deg);margin:0 auto 56px;opacity:.6}
  .prose{font-size:var(--rfs,18px);line-height:2.0;font-weight:400;color:#2c2a24}
  .prose p{margin:0 0 1.6em}
  .verse{font-size:var(--rfs,18px);line-height:2.1;font-weight:400;color:#2c2a24;max-width:42ch;margin:0 auto;text-align:left}
  .verse .ln{white-space:pre-wrap}
  .verse .ln.blank{height:1.1em}
  .cjk .prose,.cjk .verse{line-height:2.25;letter-spacing:.05em;font-family:"Noto Serif SC","Songti SC",serif}
  .cjk .prose p{text-indent:2em}
  .cjk .scroll h2,.cjk .scroll .s-book{font-family:"Noto Serif SC","Songti SC",serif}

  .rnav{max-width:640px;margin:80px auto 0;display:flex;justify-content:space-between;gap:20px;
        border-top:1px solid var(--line);padding-top:34px}
  .rnav button{background:none;border:none;font-family:inherit;color:inherit;flex:1;max-width:46%;text-align:left}
  .rnav button.next{text-align:right}
  .rnav button:disabled{opacity:.2;cursor:not-allowed}
  .rnav .d{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .rnav .t{font-weight:300;font-size:16px}
  .rnav button:not(:disabled):hover .t{color:var(--clay)}
  .r-end{text-align:center;margin-top:44px}
  .r-end .e{width:18px;height:18px;border:1.4px solid var(--faint);border-radius:50%;border-right-color:transparent;transform:rotate(-25deg);display:inline-block;opacity:.5}

  footer{margin-top:120px;padding-top:30px;border-top:1px solid var(--line);text-align:center;
        font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--faint)}

  .hidden{display:none !important}

  @media(max-width:760px){
    .topin,.wrap{padding-left:24px;padding-right:24px}
    .det-grid{grid-template-columns:1fr;gap:46px}
    .det-cover{max-width:230px}
    .hero .big-enso{width:110px;height:110px;right:0}
    .rbar select{max-width:54vw}
  }
</style>
</head>
<body>
<header class="top">
  <div class="topin">
    <div class="mark" id="markHome">
      <span class="e"></span>
      <span class="nm">間<small>あいだ · the shelf</small></span>
    </div>
    <span class="crumb" id="crumb">Library</span>
  </div>
</header>

<main class="wrap">

  <!-- LIBRARY -->
  <section id="view-library">
    <div class="hero">
      <span class="big-enso"></span>
      <h1>A few <span class="jp">books</span>,<br>much empty space,<br>and time to be still.</h1>
      <p class="sub" id="sub"></p>
      <div class="count" id="count"></div>
    </div>
    <div class="filters" id="filters" role="group" aria-label="Filter by category"></div>
    <div id="catContainer"></div>
  </section>

  <!-- DETAIL -->
  <section id="view-detail" class="detail hidden"></section>

  <!-- READER -->
  <section id="view-reader" class="reader hidden"></section>

  <footer id="foot"></footer>
</main>

<script src="../../data/books.js"></script>
<script>
(function(){
  "use strict";
  var DATA=window.BOOKS||{books:[],categories:[]};
  var BOOKS=DATA.books||[];
  var CATS=DATA.categories||[];
  var catMap={};CATS.forEach(function(c){catMap[c.id]=c;});

  function isCJK(s){return /[㐀-鿿]/.test(s||"");}
  function $(id){return document.getElementById(id);}
  function el(t,c,x){var e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;}
  function pad(n){return String(n).padStart(2,"0");}

  var totalCh=0,totalWords=0;
  BOOKS.forEach(function(b){totalCh+=(b.chapters||[]).length;totalWords+=(b.words||0);});
  $("sub").textContent="A small, unhurried collection of "+BOOKS.length+" public-domain works, gathered into "+CATS.length+" quiet rooms. Take one down. Read slowly. Leave the rest in their silence.";
  $("count").textContent=BOOKS.length+" works · "+CATS.length+" rooms · "+totalCh+" passages";
  $("foot").textContent="間 · "+(DATA.source||"Project Gutenberg")+" · 余白を読む";

  function countIn(id){return BOOKS.filter(function(b){return b.category===id;}).length;}

  var current="all";
  function renderFilters(){
    var f=$("filters");f.innerHTML="";
    var all=el("button",null);all.innerHTML='All <span class="n">'+BOOKS.length+'</span>';
    all.setAttribute("aria-pressed",current==="all"?"true":"false");
    all.onclick=function(){current="all";renderLibrary();};
    f.appendChild(all);
    CATS.forEach(function(c){
      var b=el("button",null);b.innerHTML=c.name+' <span class="n">'+countIn(c.id)+'</span>';
      b.setAttribute("aria-pressed",current===c.id?"true":"false");
      b.onclick=function(){current=c.id;renderLibrary();};
      f.appendChild(b);
    });
  }

  function coverNode(b){
    var cv=el("div","cover m-"+b.category);
    var ink=el("span","ink enso-mark");cv.appendChild(ink);
    var t=el("div","c-title",b.title);if(isCJK(b.title))t.style.fontFamily='"Noto Serif SC","Songti SC",serif';
    cv.appendChild(t);
    cv.appendChild(el("div","c-author",b.author));
    cv.appendChild(el("div","c-seal","読"));
    return cv;
  }

  function cardNode(b){
    var c=el("button","card");c.setAttribute("aria-label",b.title+" by "+b.author);
    c.appendChild(coverNode(b));
    c.appendChild(el("div","c-meta",(b.chapters||[]).length+" passages"));
    c.onclick=function(){openDetail(b.id);};
    return c;
  }

  var catContainer=$("catContainer");
  function renderLibrary(){
    renderFilters();
    catContainer.innerHTML="";
    var cats=current==="all"?CATS:CATS.filter(function(c){return c.id===current;});
    cats.forEach(function(c,ci){
      var list=BOOKS.filter(function(b){return b.category===c.id;});
      if(!list.length)return;
      var sec=el("div","catsec");
      var head=el("div","catsec-head");
      head.appendChild(el("h2",null,c.name));
      head.appendChild(el("span","tl",c.tagline||""));
      head.appendChild(el("span","ix",pad(list.length)));
      sec.appendChild(head);
      var g=el("div","grid");
      list.forEach(function(b){g.appendChild(cardNode(b));});
      sec.appendChild(g);
      catContainer.appendChild(sec);
    });
    $("crumb").textContent=current==="all"?"Library":(catMap[current]?catMap[current].name:"Library");
  }

  function show(v){["library","detail","reader"].forEach(function(x){$("view-"+x).classList.toggle("hidden",x!==v);});window.scrollTo(0,0);}
  function bookById(id){for(var i=0;i<BOOKS.length;i++)if(BOOKS[i].id===id)return BOOKS[i];return null;}

  var detailWrap=$("view-detail");
  function openDetail(id){
    var b=bookById(id);if(!b)return;
    detailWrap.innerHTML="";
    var grid=el("div","det-grid");
    var cvw=el("div","det-cover");cvw.appendChild(coverNode(b));grid.appendChild(cvw);
    var main=el("div","det-main");
    main.appendChild(el("div","cat",(catMap[b.category]?catMap[b.category].name:b.category)+" · "+(catMap[b.category]?catMap[b.category].tagline:"")));
    var h1=el("h1",null,b.title);if(isCJK(b.title))h1.style.fontFamily='"Noto Serif SC","Songti SC",serif';
    main.appendChild(h1);
    main.appendChild(el("div","by","— "+b.author));
    main.appendChild(el("p","blurb",b.blurb||""));
    var facts=el("div","det-facts");
    function fact(k,v){var d=el("div");d.appendChild(el("div","k",k));d.appendChild(el("div","v",v));return d;}
    facts.appendChild(fact("Passages",(b.chapters||[]).length));
    facts.appendChild(fact("Words",(b.words||0).toLocaleString()));
    main.appendChild(facts);
    var start=el("button","startbtn");start.innerHTML='<span class="e"></span> Begin reading';
    start.onclick=function(){openReader(b.id,0);};
    main.appendChild(start);
    grid.appendChild(main);
    detailWrap.appendChild(grid);

    var contents=el("div","contents");
    contents.appendChild(el("div","ch-head","Contents"));
    (b.chapters||[]).forEach(function(ch,i){
      var row=el("button","chrow");
      row.appendChild(el("span","cn",pad(i+1)));
      var ct=el("span","ct",ch.title);if(isCJK(ch.title))ct.style.fontFamily='"Noto Serif SC","Songti SC",serif';
      row.appendChild(ct);
      row.appendChild(el("span","cty",ch.type==="verse"?"Verse":"Prose"));
      row.appendChild(el("span","ar","○"));
      row.onclick=function(){openReader(b.id,i);};
      contents.appendChild(row);
    });
    detailWrap.appendChild(contents);

    var back=el("a","backlink","← Return to the shelf");back.href="#";
    back.onclick=function(e){e.preventDefault();show("library");renderLibrary();};
    detailWrap.appendChild(back);

    $("crumb").textContent=b.title;
    show("detail");
  }

  var fontSizes=[16,18,20,22,25,28];var fsIdx=2;
  var cur={bookId:null,ch:0};
  var readerWrap=$("view-reader");
  function openReader(id,ch){cur.bookId=id;cur.ch=ch;renderReader();show("reader");}

  function renderReader(){
    var b=bookById(cur.bookId);if(!b)return;
    var chapters=b.chapters||[];var ch=chapters[cur.ch];
    var cjk=isCJK(b.title)||isCJK(ch.title)||(ch.paragraphs&&ch.paragraphs.some(isCJK));
    readerWrap.innerHTML="";
    readerWrap.classList.toggle("cjk",!!cjk);

    var bar=el("div","rbar");
    var toLib=el("button","lnk","← Shelf");toLib.onclick=function(){show("library");renderLibrary();};
    var toBook=el("button","lnk","Contents");toBook.onclick=function(){openDetail(b.id);};
    bar.appendChild(toLib);bar.appendChild(toBook);
    var sel=el("select");sel.setAttribute("aria-label","Jump to passage");
    chapters.forEach(function(c,i){var o=el("option",null,pad(i+1)+"  "+c.title);o.value=i;if(i===cur.ch)o.selected=true;sel.appendChild(o);});
    sel.onchange=function(){cur.ch=parseInt(sel.value,10);renderReader();};
    bar.appendChild(sel);
    bar.appendChild(el("div","spacer"));
    var fs=el("div","fs");
    var minus=el("button","s","A");minus.setAttribute("aria-label","Smaller text");minus.onclick=function(){if(fsIdx>0){fsIdx--;applyFs();}};
    var plus=el("button","l","A");plus.setAttribute("aria-label","Larger text");plus.onclick=function(){if(fsIdx<fontSizes.length-1){fsIdx++;applyFs();}};
    fs.appendChild(minus);fs.appendChild(plus);bar.appendChild(fs);
    readerWrap.appendChild(bar);

    var scroll=el("div","scroll");
    scroll.appendChild(el("div","s-cat",(catMap[b.category]?catMap[b.category].name:b.category)+" · "+(cur.ch+1)+" / "+chapters.length));
    var h2=el("h2",null,ch.title);if(cjk)h2.style.fontFamily='"Noto Serif SC","Songti SC",serif';
    scroll.appendChild(h2);
    var sb=el("div","s-book");sb.textContent=b.title+" — "+b.author;if(cjk)sb.style.fontFamily='"Noto Serif SC","Songti SC",serif';
    scroll.appendChild(sb);
    scroll.appendChild(el("span","s-enso"));

    if(ch.type==="verse"){
      var v=el("div","verse");
      (ch.lines||[]).forEach(function(line){
        var ln=el("div","ln");
        if(line.trim()===""){ln.className="ln blank";}else{ln.textContent=line;}
        v.appendChild(ln);
      });
      scroll.appendChild(v);
    }else{
      var pr=el("div","prose");
      (ch.paragraphs||[]).forEach(function(p){pr.appendChild(el("p",null,p));});
      scroll.appendChild(pr);
    }
    var end=el("div","r-end");end.appendChild(el("span","e"));scroll.appendChild(end);
    readerWrap.appendChild(scroll);

    var nav=el("div","rnav");
    var prev=el("button","prev");prev.disabled=cur.ch<=0;
    prev.innerHTML='<div class="d">Previous</div><div class="t">'+(cur.ch>0?esc(chapters[cur.ch-1].title):"—")+'</div>';
    prev.onclick=function(){if(cur.ch>0){cur.ch--;renderReader();}};
    var next=el("button","next");next.disabled=cur.ch>=chapters.length-1;
    next.innerHTML='<div class="d">Next</div><div class="t">'+(cur.ch<chapters.length-1?esc(chapters[cur.ch+1].title):"—")+'</div>';
    next.onclick=function(){if(cur.ch<chapters.length-1){cur.ch++;renderReader();}};
    nav.appendChild(prev);nav.appendChild(next);
    readerWrap.appendChild(nav);

    applyFs();
    $("crumb").textContent=b.title;
  }
  function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
  function applyFs(){readerWrap.style.setProperty("--rfs",fontSizes[fsIdx]+"px");}

  $("markHome").onclick=function(){show("library");renderLibrary();};
  renderLibrary();
})();
</script>
</body>
</html>
