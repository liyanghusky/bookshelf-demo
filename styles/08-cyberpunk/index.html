<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NIGHT//LIBRARY — neural archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07060d;
  --bg2:#0d0a1a;
  --panel:rgba(18,12,34,.72);
  --mag:#ff00a0;
  --cyan:#00f0ff;
  --amber:#ffd24a;
  --text:#cfe9f2;
  --dim:#7a86a8;
  --max:1200px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(circle at 15% 0%, rgba(255,0,160,.16), transparent 45%),
    radial-gradient(circle at 90% 30%, rgba(0,240,255,.14), transparent 45%),
    var(--bg);
  color:var(--text);
  font-family:'Rajdhani', system-ui, sans-serif;
  font-size:18px;line-height:1.55;min-height:100vh;
  cursor:crosshair;
  overflow-x:hidden;
}
/* scanlines + flicker */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;opacity:.5;
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:49;
  background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.55));
  animation:flick 6s infinite steps(60);
}
@keyframes flick{0%,97%,100%{opacity:.9}98%{opacity:.7}99%{opacity:1}}
::selection{background:var(--mag);color:#000}
a{color:inherit;text-decoration:none}
button,select{font-family:inherit;color:inherit;cursor:crosshair;background:none;border:none}

.wrap{position:relative;z-index:2;max-width:var(--max);margin:0 auto;padding:0 20px 90px}

/* corner-bracket panel */
.hud{position:relative;border:1px solid rgba(0,240,255,.3);background:var(--panel);backdrop-filter:blur(4px)}
.hud::before,.hud::after,.hud .bl,.hud .br{content:"";position:absolute;width:14px;height:14px;border:2px solid var(--cyan);pointer-events:none}
.hud::before{top:-2px;left:-2px;border-right:0;border-bottom:0}
.hud::after{top:-2px;right:-2px;border-left:0;border-bottom:0}

/* masthead */
header.mast{padding:32px 0 10px;text-align:center}
.mast .crumbs{font-family:'Share Tech Mono',monospace;color:var(--cyan);font-size:11px;letter-spacing:.28em;opacity:.8}
.glitch{
  font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.06em;
  font-size:clamp(30px,7vw,68px);position:relative;display:inline-block;margin:10px 0 6px;color:#fff;
  text-shadow:0 0 12px rgba(0,240,255,.6);
}
.glitch::before,.glitch::after{content:attr(data-t);position:absolute;left:0;top:0;width:100%;overflow:hidden;}
.glitch::before{color:var(--mag);animation:gl1 3.2s infinite linear;clip-path:inset(0 0 55% 0)}
.glitch::after{color:var(--cyan);animation:gl2 2.7s infinite linear;clip-path:inset(55% 0 0 0)}
@keyframes gl1{0%,92%,100%{transform:translate(0,0)}93%{transform:translate(-3px,-1px)}96%{transform:translate(2px,1px)}}
@keyframes gl2{0%,90%,100%{transform:translate(0,0)}91%{transform:translate(3px,1px)}97%{transform:translate(-2px,-1px)}}
.mast .tag{font-family:'Rajdhani';font-weight:600;letter-spacing:.4em;text-transform:uppercase;color:var(--dim);font-size:12px}
.mast .barline{height:2px;max-width:560px;margin:18px auto 0;background:linear-gradient(90deg,transparent,var(--mag),var(--cyan),transparent)}

/* filters */
.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:34px 0 6px}
.filters button{
  font-family:'Rajdhani';font-weight:600;letter-spacing:.18em;text-transform:uppercase;font-size:13px;
  padding:9px 18px;color:var(--cyan);border:1px solid rgba(0,240,255,.4);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  background:rgba(0,240,255,.05);transition:.18s;
}
.filters button:hover{background:rgba(0,240,255,.16);box-shadow:0 0 14px rgba(0,240,255,.4)}
.filters button.active{background:var(--mag);color:#000;border-color:var(--mag);box-shadow:0 0 18px rgba(255,0,160,.6)}

/* sections */
.sec-h{display:flex;align-items:center;gap:14px;margin:48px 0 20px}
.sec-h .lbl{font-family:'Orbitron';font-weight:700;letter-spacing:.12em;color:#fff;font-size:18px;text-shadow:0 0 10px rgba(255,0,160,.5)}
.sec-h .lbl span{color:var(--mag)}
.sec-h .tag{font-family:'Share Tech Mono',monospace;color:var(--dim);font-size:11px;letter-spacing:.2em}
.sec-h .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--mag),transparent)}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:22px}
.card{position:relative;cursor:crosshair;transition:transform .2s}
.card:hover{transform:translateY(-5px)}
.card:focus-visible{outline:2px solid var(--cyan);outline-offset:3px}
.cover{
  aspect-ratio:2/3;position:relative;overflow:hidden;border:1px solid rgba(0,240,255,.35);
  background:linear-gradient(160deg,#140a26,#06040c);
  display:flex;flex-direction:column;justify-content:flex-end;padding:14px;
  clip-path:polygon(0 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%);
}
.cover .scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,240,255,.05) 2px 4px)}
.cover .grid-bg{position:absolute;inset:0;opacity:.5}
.cover .num{position:absolute;top:10px;left:12px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan);letter-spacing:.2em;opacity:.8}
.cover .glow{position:absolute;top:-30%;left:-20%;width:140%;height:80%;filter:blur(40px);opacity:.55}
.cover .ctitle{position:relative;z-index:2;font-family:'Orbitron';font-weight:700;font-size:clamp(14px,2.4vw,19px);line-height:1.1;color:#fff;text-shadow:0 0 8px var(--cyan),0 0 2px #000;text-transform:uppercase;letter-spacing:.02em}
.cover .cauth{position:relative;z-index:2;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--mag);letter-spacing:.08em}
.cover .frame{position:absolute;inset:7px;border:1px solid rgba(255,0,160,.5);pointer-events:none;z-index:1}
.card .meta{padding:10px 2px}
.card .meta .t{font-family:'Rajdhani';font-weight:700;font-size:15px;letter-spacing:.04em;color:#fff;text-transform:uppercase;line-height:1.15}
.card .meta .a{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);margin-top:3px}

/* detail */
.back{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:.18em;color:var(--cyan);padding:10px 0;display:inline-block;transition:.18s}
.back:hover{color:var(--mag);text-shadow:0 0 8px var(--mag)}
.detail{max-width:920px;margin:0 auto}
.detail .head{display:grid;grid-template-columns:210px 1fr;gap:34px;margin-top:14px;align-items:start}
.detail .info h2{font-family:'Orbitron';font-weight:900;font-size:clamp(24px,4vw,40px);color:#fff;margin:0 0 6px;line-height:1.05;text-shadow:0 0 14px rgba(0,240,255,.5);text-transform:uppercase;letter-spacing:.02em}
.detail .info .by{font-family:'Share Tech Mono',monospace;color:var(--mag);font-size:14px;letter-spacing:.1em}
.detail .info .cat{display:inline-block;margin:16px 0;font-family:'Rajdhani';font-weight:700;letter-spacing:.2em;text-transform:uppercase;font-size:12px;color:#000;background:var(--cyan);padding:5px 14px;clip-path:polygon(6px 0,100% 0,100% 100%,0 100%,0 6px)}
.detail .info .blurb{font-size:19px;color:#bcd6e0;max-width:48ch;line-height:1.6}
.start{margin-top:22px;font-family:'Orbitron';font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:14px;padding:14px 28px;color:#000;background:var(--mag);box-shadow:0 0 22px rgba(255,0,160,.55);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);transition:.18s}
.start:hover{background:var(--cyan);box-shadow:0 0 26px rgba(0,240,255,.6)}
.divider{display:flex;align-items:center;gap:12px;margin:40px 0 18px}
.divider .lbl{font-family:'Orbitron';font-weight:700;color:var(--cyan);letter-spacing:.16em;font-size:15px}
.divider .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--cyan),transparent)}
.chlist{list-style:none;margin:0;padding:0;display:grid;gap:8px}
.chlist button{
  width:100%;text-align:left;padding:15px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;
  border:1px solid rgba(0,240,255,.25);background:rgba(12,8,26,.6);transition:.16s;
  clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);
}
.chlist button:hover{border-color:var(--mag);background:rgba(255,0,160,.08);transform:translateX(5px);box-shadow:-4px 0 0 var(--mag)}
.chlist .t{font-family:'Rajdhani';font-weight:600;font-size:18px;color:#fff;letter-spacing:.03em}
.chlist .num{font-family:'Share Tech Mono',monospace;color:var(--cyan);font-size:12px;margin-right:10px}
.chlist .tag{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--mag);border:1px solid rgba(255,0,160,.4);padding:2px 8px}

/* reader */
.reader{max-width:760px;margin:0 auto}
.rtop{position:sticky;top:0;z-index:30;background:rgba(7,6,13,.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,240,255,.3);padding:11px 0;margin-bottom:30px;display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center}
.rtop .grp{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ctrl{font-family:'Rajdhani';font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:12px;padding:8px 14px;border:1px solid rgba(0,240,255,.4);color:var(--cyan);background:rgba(0,240,255,.05);transition:.16s;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)}
.ctrl:hover:not(:disabled){background:var(--mag);color:#000;border-color:var(--mag);box-shadow:0 0 14px rgba(255,0,160,.5)}
.ctrl:disabled{opacity:.3;cursor:not-allowed}
.rtop select{font-family:'Share Tech Mono',monospace;font-size:12px;background:#0d0a1a;color:var(--cyan);border:1px solid rgba(0,240,255,.4);padding:8px 10px;cursor:crosshair}
.rhead{margin-bottom:30px;border-left:3px solid var(--mag);padding-left:16px}
.rhead .bk{font-family:'Share Tech Mono',monospace;color:var(--dim);font-size:12px;letter-spacing:.14em}
.rhead h2{font-family:'Orbitron';font-weight:700;font-size:clamp(22px,4vw,34px);color:#fff;margin:.2em 0 0;text-shadow:0 0 14px rgba(0,240,255,.45);text-transform:uppercase}
.prose{font-size:var(--rfs,20px);line-height:1.85;color:#dbe9ef;font-weight:400}
.prose p{margin:0 0 1.25em}
.prose p:first-of-type::first-letter{font-family:'Orbitron';font-weight:900;float:left;font-size:3.2em;line-height:.8;padding:4px 12px 0 0;color:var(--mag);text-shadow:0 0 16px rgba(255,0,160,.6)}
.verse{font-size:var(--rfs,20px);line-height:1.95;color:#dbe9ef}
.verse .stanza{margin:0 0 1.5em;border-left:1px solid rgba(0,240,255,.2);padding-left:16px}
.verse .ln{white-space:pre-wrap}
.rnav{display:flex;justify-content:space-between;gap:12px;margin:48px 0 8px;border-top:1px solid rgba(0,240,255,.25);padding-top:22px}
.empty{text-align:center;padding:70px;color:var(--dim);font-family:'Share Tech Mono',monospace}

@media(max-width:640px){
  body{font-size:17px}
  .detail .head{grid-template-columns:1fr}
  .detail .info .blurb{max-width:none}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="crumbs">// NEURAL ARCHIVE v2.077 :: PUBLIC DOMAIN NODE ONLINE</div>
    <h1 class="glitch" data-t="NIGHT//LIBRARY">NIGHT//LIBRARY</h1>
    <div class="tag">decrypted reading terminal</div>
    <div class="barline"></div>
  </header>
  <main id="app"></main>
</div>

<script src="../../data/books.js"></script>
<script>
(function(){
  var D=window.BOOKS;
  var app=document.getElementById('app');
  var state={view:'library',filter:'all',bookId:null,chapter:0,fs:20};
  var catName={}; D.categories.forEach(function(c){catName[c.id]=c.name;});

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function rich(s){return esc(s).replace(/_([^_]+)_/g,'<em>$1</em>');}
  function bookById(id){return D.books.filter(function(b){return b.id===id;})[0];}
  function pad(n){return (n<10?'0':'')+n;}

  function glowColor(cat){
    return {fiction:'#00f0ff',mystery:'#ff00a0',scifi:'#a855ff',philosophy:'#ffd24a',poetry:'#00ffa0'}[cat]||'#00f0ff';
  }
  function coverHTML(book,idx){
    var g=glowColor(book.category);
    var n=idx!==undefined?idx:D.books.indexOf(book);
    var gridbg='<svg class="grid-bg" viewBox="0 0 100 150" preserveAspectRatio="none">'+
      '<defs><pattern id="g'+book.id+'" width="10" height="10" patternUnits="userSpaceOnUse">'+
      '<path d="M10 0H0V10" fill="none" stroke="'+g+'" stroke-width=".4" opacity=".35"/></pattern></defs>'+
      '<rect width="100" height="150" fill="url(#g'+book.id+')"/></svg>';
    return '<div class="cover">'+
      '<div class="glow" style="background:'+g+'"></div>'+gridbg+
      '<div class="scan"></div><div class="frame"></div>'+
      '<div class="num">ID_'+pad(n+1)+' // '+book.category.toUpperCase()+'</div>'+
      '<div class="ctitle">'+esc(book.title)+'</div>'+
      '<div class="cauth">&gt; '+esc(book.author)+'</div></div>';
  }

  function renderLibrary(){
    var html='<div class="filters">';
    html+='<button data-f="all" class="'+(state.filter==='all'?'active':'')+'">All_Nodes</button>';
    D.categories.forEach(function(c){html+='<button data-f="'+c.id+'" class="'+(state.filter===c.id?'active':'')+'">'+esc(c.name)+'</button>';});
    html+='</div>';
    var cats=state.filter==='all'?D.categories:D.categories.filter(function(c){return c.id===state.filter;});
    cats.forEach(function(c){
      var books=D.books.filter(function(b){return b.category===c.id;});
      if(!books.length)return;
      html+='<section><div class="sec-h"><div class="lbl"><span>&gt;</span> '+esc(c.name)+'</div>'+
        '<div class="tag">[ '+esc(c.tagline)+' ]</div><div class="ln"></div></div><div class="grid">';
      books.forEach(function(b){
        html+='<a class="card" tabindex="0" role="button" data-book="'+b.id+'" aria-label="Open '+esc(b.title)+'">'+
          coverHTML(b)+'<div class="meta"><div class="t">'+esc(b.title)+'</div><div class="a">'+esc(b.author)+'</div></div></a>';
      });
      html+='</div></section>';
    });
    app.innerHTML=html;
  }

  function renderDetail(){
    var b=bookById(state.bookId);
    var html='<div class="detail"><button class="back" data-nav="library">&lt;&lt; RETURN_TO_ARCHIVE</button>';
    html+='<div class="head">'+coverHTML(b)+'<div class="info"><h2>'+esc(b.title)+'</h2>'+
      '<div class="by">&gt; AUTHOR: '+esc(b.author)+'</div>'+
      '<div class="cat">'+esc(catName[b.category])+'</div>'+
      '<p class="blurb">'+esc(b.blurb)+'</p>'+
      '<button class="start" data-read="0">&#9654; JACK IN</button></div></div>';
    html+='<div class="divider"><span class="lbl">// CONTENTS</span><span class="ln"></span></div><ul class="chlist">';
    b.chapters.forEach(function(ch,i){
      html+='<li><button data-read="'+i+'"><span><span class="num">['+pad(i+1)+']</span><span class="t">'+esc(ch.title)+'</span></span>'+
        '<span class="tag">'+(ch.type==='verse'?'VERSE':'TEXT')+'</span></button></li>';
    });
    html+='</ul></div>';app.innerHTML=html;window.scrollTo(0,0);
  }

  function renderReader(){
    var b=bookById(state.bookId);var ch=b.chapters[state.chapter];
    var html='<div class="reader"><div class="rtop"><div class="grp">'+
      '<button class="ctrl" data-nav="library">Archive</button>'+
      '<button class="ctrl" data-nav="detail">Contents</button></div><div class="grp">'+
      '<button class="ctrl" data-step="-1" '+(state.chapter===0?'disabled':'')+'>&#9664; Prev</button>'+
      '<select id="jump">';
    b.chapters.forEach(function(c,i){html+='<option value="'+i+'" '+(i===state.chapter?'selected':'')+'>'+esc(c.title)+'</option>';});
    html+='</select><button class="ctrl" data-step="1" '+(state.chapter===b.chapters.length-1?'disabled':'')+'>Next &#9654;</button>'+
      '<button class="ctrl" data-fs="-1" aria-label="Smaller">A&#8722;</button>'+
      '<button class="ctrl" data-fs="1" aria-label="Larger">A&#43;</button></div></div>';
    html+='<div class="rhead"><div class="bk">'+esc(b.title)+' :: '+esc(b.author)+'</div><h2>'+esc(ch.title)+'</h2></div>';
    if(ch.type==='verse'){
      html+='<div class="verse" style="--rfs:'+state.fs+'px">';var st='';
      ch.lines.forEach(function(ln){if(ln.trim()===''){if(st){html+='<div class="stanza">'+st+'</div>';st='';}}else st+='<div class="ln">'+rich(ln)+'</div>';});
      if(st)html+='<div class="stanza">'+st+'</div>';html+='</div>';
    }else{
      html+='<div class="prose" style="--rfs:'+state.fs+'px">';
      ch.paragraphs.forEach(function(p){html+='<p>'+rich(p)+'</p>';});html+='</div>';
    }
    html+='<div class="rnav"><button class="ctrl" data-step="-1" '+(state.chapter===0?'disabled':'')+'>&#9664; Previous</button>'+
      '<button class="ctrl" data-step="1" '+(state.chapter===b.chapters.length-1?'disabled':'')+'>Next &#9654;</button></div></div>';
    app.innerHTML=html;
    document.getElementById('jump').addEventListener('change',function(){state.chapter=+this.value;renderReader();});
    window.scrollTo(0,0);
  }

  function render(){state.view==='library'?renderLibrary():state.view==='detail'?renderDetail():renderReader();}

  app.addEventListener('click',function(e){
    var t=e.target.closest('[data-book],[data-nav],[data-read],[data-step],[data-fs],[data-f]');if(!t)return;
    if(t.dataset.f){state.filter=t.dataset.f;renderLibrary();return;}
    if(t.dataset.book){state.bookId=t.dataset.book;state.view='detail';render();return;}
    if(t.dataset.nav){state.view=t.dataset.nav;render();return;}
    if(t.dataset.read!==undefined){state.chapter=+t.dataset.read;state.view='reader';render();return;}
    if(t.dataset.step){var b=bookById(state.bookId);var n=state.chapter+ +t.dataset.step;if(n>=0&&n<b.chapters.length){state.chapter=n;renderReader();}return;}
    if(t.dataset.fs){state.fs=Math.max(15,Math.min(30,state.fs+ +t.dataset.fs*2));renderReader();return;}
  });
  app.addEventListener('keydown',function(e){
    var t=e.target.closest('[data-book]');
    if(t&&(e.key==='Enter'||e.key===' ')){e.preventDefault();state.bookId=t.dataset.book;state.view='detail';render();}
  });
  render();
})();
</script>
<script src="../nav-enhance.js"></script>
</body>
</html>
