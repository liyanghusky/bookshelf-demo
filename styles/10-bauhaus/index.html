<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAUHAUS BÜCHEREI — A Constructivist Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#e63327;
    --yellow:#f4c20d;
    --blue:#1f4fd8;
    --black:#0d0d0d;
    --paper:#f4efe3;
    --paper2:#ece5d4;
    --line:6px;
    --reader-size:21px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{
    font-family:"Archivo","Poppins",sans-serif;
    background:var(--paper);
    color:var(--black);
    line-height:1.45;
    overflow-x:hidden;
  }
  h1,h2,h3,.display{font-family:"Archivo Black","Archivo",sans-serif;text-transform:uppercase;letter-spacing:-0.01em;line-height:0.92}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--blue);color:#fff}
  .wrap{max-width:1240px;margin:0 auto;padding:0 24px}
  .view{display:none}
  .view.active{display:block;animation:pop .35s cubic-bezier(.2,.9,.3,1.3)}
  @keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* ---------- MASTHEAD ---------- */
  header.mast{
    border-bottom:var(--line) solid var(--black);
    background:var(--paper);
    position:sticky;top:0;z-index:60;
  }
  .mast-in{display:flex;align-items:stretch;gap:0}
  .logo-mark{
    width:84px;flex:0 0 84px;background:var(--red);
    border-right:var(--line) solid var(--black);
    display:grid;place-items:center;position:relative;overflow:hidden;
  }
  .logo-mark::before{content:"";position:absolute;width:46px;height:46px;border-radius:50%;background:var(--yellow);left:-14px;top:-14px}
  .logo-mark::after{content:"";position:absolute;width:0;height:0;border-left:30px solid transparent;border-right:30px solid transparent;border-bottom:48px solid var(--blue);right:-6px;bottom:-6px}
  .logo-txt{flex:1;display:flex;flex-direction:column;justify-content:center;padding:14px 24px}
  .logo-txt .l1{font-size:clamp(20px,3.4vw,34px)}
  .logo-txt .l2{font-family:"Poppins";font-weight:600;text-transform:uppercase;letter-spacing:.32em;font-size:11px;color:var(--blue);margin-top:4px}
  .mast-shapes{display:flex;border-left:var(--line) solid var(--black)}
  .mast-shapes div{width:54px;border-right:var(--line) solid var(--black)}
  .mast-shapes div:last-child{border-right:none}
  .ms-r{background:var(--red)}.ms-y{background:var(--yellow)}.ms-b{background:var(--blue)}
  @media(max-width:720px){.mast-shapes{display:none}}

  /* ---------- HERO ---------- */
  .hero{border-bottom:var(--line) solid var(--black);position:relative;overflow:hidden;background:var(--paper2)}
  .hero-in{display:grid;grid-template-columns:1.5fr 1fr;min-height:300px}
  .hero-txt{padding:48px 24px 40px;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:2}
  .hero-txt h2{font-size:clamp(36px,7vw,82px);max-width:11ch}
  .hero-txt h2 .k{color:var(--red)}
  .hero-txt p{font-family:"Poppins";font-weight:500;max-width:42ch;margin-top:20px;font-size:16px;line-height:1.5}
  .hero-art{border-left:var(--line) solid var(--black);position:relative;background:var(--yellow)}
  .hero-art .circ{position:absolute;width:60%;aspect-ratio:1;border-radius:50%;background:var(--blue);left:-12%;top:14%}
  .hero-art .sq{position:absolute;width:46%;aspect-ratio:1;background:var(--red);right:8%;bottom:-8%;transform:rotate(0)}
  .hero-art .tri{position:absolute;width:0;height:0;border-left:54px solid transparent;border-right:54px solid transparent;border-bottom:96px solid var(--black);right:18%;top:10%}
  @media(max-width:720px){.hero-in{grid-template-columns:1fr}.hero-art{display:none}}

  /* ---------- FILTER BAR ---------- */
  .filterbar{border-bottom:var(--line) solid var(--black);background:var(--paper);position:sticky;top:0;z-index:55}
  .filter-in{display:flex;flex-wrap:wrap;align-items:stretch}
  .filter-in .flabel{font-family:"Poppins";font-weight:700;text-transform:uppercase;letter-spacing:.2em;font-size:11px;display:flex;align-items:center;padding:0 18px;border-right:var(--line) solid var(--black);background:var(--black);color:var(--paper)}
  .chip{
    font-family:"Archivo";font-weight:800;text-transform:uppercase;font-size:14px;letter-spacing:.02em;
    padding:14px 20px;border-right:var(--line) solid var(--black);background:var(--paper);
    position:relative;transition:background .12s,color .12s;
  }
  .chip:last-child{border-right:none}
  .chip:hover{background:var(--yellow)}
  .chip.on{background:var(--blue);color:#fff}
  .chip .dot{display:inline-block;width:12px;height:12px;margin-right:8px;vertical-align:middle}
  @media(max-width:720px){.filter-in .flabel{width:100%;border-right:none;border-bottom:var(--line) solid var(--black);padding:8px 18px}.chip{flex:1}}

  /* ---------- GRID ---------- */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-bottom:var(--line) solid var(--black)}
  .grid > *{border-right:var(--line) solid var(--black);border-bottom:var(--line) solid var(--black)}
  .grid > *:nth-child(3n){border-right:none}
  @media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}.grid > *:nth-child(3n){border-right:var(--line) solid var(--black)}.grid > *:nth-child(2n){border-right:none}}
  @media(max-width:620px){.grid{grid-template-columns:1fr}.grid > *{border-right:none!important}}
  .card{background:var(--paper);cursor:pointer;position:relative;display:flex;flex-direction:column;transition:transform .14s}
  .card:hover{transform:translateY(-3px);z-index:3}
  .card:hover .cover{filter:saturate(1.15)}
  .cover{aspect-ratio:3/4;position:relative;overflow:hidden;border-bottom:var(--line) solid var(--black)}
  .card-meta{padding:16px 18px 20px;background:var(--paper)}
  .card-cat{font-family:"Poppins";font-weight:700;text-transform:uppercase;letter-spacing:.18em;font-size:10px;color:var(--blue);margin-bottom:8px}
  .card-title{font-size:21px;line-height:0.96;margin-bottom:8px}
  .card-author{font-family:"Poppins";font-weight:500;font-size:13px;opacity:.75}
  .card-words{font-family:"Poppins";font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-top:10px;display:inline-block;background:var(--black);color:var(--paper);padding:3px 8px}

  /* COVER ART (geometric, seeded per book) */
  .cv{position:absolute;inset:0}
  .cv .shp{position:absolute}
  .cover-title{position:absolute;left:14px;right:14px;bottom:12px;z-index:5}
  .cover-title .ct{font-family:"Archivo Black";text-transform:uppercase;line-height:0.9;font-size:clamp(15px,2.6vw,22px);color:#fff;mix-blend-mode:normal;text-shadow:0 2px 0 rgba(0,0,0,.35)}
  .cover-rule{position:absolute;left:0;right:0;height:var(--line);background:var(--black);z-index:4}

  /* ---------- DETAIL ---------- */
  .crumb{font-family:"Poppins";font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;padding:18px 0;display:flex;gap:10px;align-items:center}
  .crumb button{display:inline-flex;align-items:center;gap:8px;background:var(--yellow);padding:8px 14px;border:3px solid var(--black);font-weight:800}
  .crumb button:hover{background:var(--red);color:#fff}
  .detail-grid{display:grid;grid-template-columns:340px 1fr;gap:0;border:var(--line) solid var(--black);margin-bottom:48px}
  .detail-cover{aspect-ratio:3/4;position:relative;border-right:var(--line) solid var(--black);min-height:420px}
  .detail-body{padding:36px 36px 40px;display:flex;flex-direction:column}
  .detail-cat{font-family:"Poppins";font-weight:700;text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:#fff;background:var(--red);align-self:flex-start;padding:6px 12px;margin-bottom:18px}
  .detail-body h2{font-size:clamp(30px,5vw,52px);margin-bottom:10px}
  .detail-author{font-family:"Poppins";font-weight:600;font-size:18px;margin-bottom:22px}
  .detail-author::before{content:"";display:inline-block;width:28px;height:14px;background:var(--blue);margin-right:10px;vertical-align:middle}
  .detail-blurb{font-family:"Poppins";font-weight:400;font-size:17px;line-height:1.6;max-width:56ch;border-left:var(--line) solid var(--yellow);padding-left:18px;margin-bottom:30px}
  .startbtn{align-self:flex-start;background:var(--blue);color:#fff;font-family:"Archivo Black";text-transform:uppercase;font-size:18px;padding:18px 30px;border:var(--line) solid var(--black);display:inline-flex;align-items:center;gap:14px;transition:transform .12s,box-shadow .12s;box-shadow:8px 8px 0 var(--black)}
  .startbtn:hover{transform:translate(-2px,-2px);box-shadow:12px 12px 0 var(--black);background:var(--red)}
  .startbtn .arr{width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-left:14px solid #fff}
  @media(max-width:760px){.detail-grid{grid-template-columns:1fr}.detail-cover{border-right:none;border-bottom:var(--line) solid var(--black);min-height:320px}}

  .toc-h{font-family:"Archivo Black";text-transform:uppercase;font-size:22px;margin:0 0 0 0;padding:14px 18px;background:var(--black);color:var(--paper);display:flex;align-items:center;gap:12px}
  .toc-h .sqm{width:16px;height:16px;background:var(--yellow)}
  .toc{border:var(--line) solid var(--black);margin-bottom:60px}
  .toc-item{display:flex;align-items:center;gap:16px;padding:16px 18px;border-bottom:3px solid var(--black);cursor:pointer;background:var(--paper);transition:background .12s,padding-left .12s}
  .toc-item:last-child{border-bottom:none}
  .toc-item:hover{background:var(--yellow);padding-left:28px}
  .toc-num{font-family:"Archivo Black";font-size:18px;width:44px;height:44px;display:grid;place-items:center;background:var(--red);color:#fff;flex:0 0 44px}
  .toc-item:nth-child(3n+2) .toc-num{background:var(--blue)}
  .toc-item:nth-child(3n) .toc-num{background:var(--black)}
  .toc-title{font-family:"Archivo";font-weight:800;text-transform:uppercase;font-size:17px;flex:1}
  .toc-type{font-family:"Poppins";font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:10px;background:var(--black);color:var(--paper);padding:4px 8px}

  /* ---------- READER ---------- */
  #reader.active{display:flex;flex-direction:column;min-height:100vh}
  .rd-bar{position:sticky;top:0;z-index:70;background:var(--paper);border-bottom:var(--line) solid var(--black);display:flex;align-items:stretch;flex-wrap:wrap}
  .rd-bar .seg{display:flex;align-items:center;border-right:var(--line) solid var(--black)}
  .rd-bar .seg:last-child{border-right:none;margin-left:auto}
  .rb{font-family:"Archivo";font-weight:800;text-transform:uppercase;font-size:13px;letter-spacing:.04em;padding:14px 16px;display:inline-flex;align-items:center;gap:8px;border-right:3px solid var(--black);transition:background .12s,color .12s}
  .rb:last-child{border-right:none}
  .rb:hover:not(:disabled){background:var(--yellow)}
  .rb:disabled{opacity:.32;cursor:not-allowed}
  .rb.solid{background:var(--blue);color:#fff}
  .rb.solid:hover{background:var(--red)}
  .rd-jump{font-family:"Archivo";font-weight:700;text-transform:uppercase;font-size:13px;padding:12px 14px;background:var(--yellow);border:none;border-right:3px solid var(--black);cursor:pointer;max-width:240px}
  .fontctl{display:flex;align-items:center}
  .fontctl .rb{min-width:52px;justify-content:center}
  .rd-canvas{flex:1;display:flex;justify-content:center;padding:0;position:relative}
  .rd-paper{width:100%;max-width:760px;padding:56px 28px 120px;position:relative}
  .rd-kicker{font-family:"Poppins";font-weight:700;text-transform:uppercase;letter-spacing:.24em;font-size:11px;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .rd-kicker::before{content:"";width:30px;height:14px;background:var(--red)}
  .rd-title{font-family:"Archivo Black";text-transform:uppercase;font-size:clamp(28px,5vw,46px);line-height:0.94;margin-bottom:8px}
  .rd-of{font-family:"Poppins";font-weight:600;font-size:13px;opacity:.7;margin-bottom:30px;padding-bottom:30px;border-bottom:var(--line) solid var(--black)}
  .prose p{font-family:"Poppins";font-weight:400;font-size:var(--reader-size);line-height:1.8;margin-bottom:1.35em;max-width:64ch}
  .prose p:first-of-type::first-letter{font-family:"Archivo Black";font-size:3.2em;float:left;line-height:0.8;padding:6px 14px 2px 0;color:var(--red)}
  .verse{font-family:"Poppins";font-weight:400;font-size:var(--reader-size);line-height:1.9}
  .verse .ln{white-space:pre-wrap;display:block}
  .verse .stz{margin-bottom:1.4em;padding-left:18px;border-left:3px solid var(--yellow)}
  .rd-foot{display:flex;gap:0;border-top:var(--line) solid var(--black);margin-top:50px}
  .rd-foot button{flex:1;font-family:"Archivo Black";text-transform:uppercase;font-size:16px;padding:22px;border-right:var(--line) solid var(--black);display:flex;align-items:center;justify-content:center;gap:12px;transition:background .12s,color .12s}
  .rd-foot button:last-child{border-right:none}
  .rd-foot button:hover:not(:disabled){background:var(--blue);color:#fff}
  .rd-foot button:disabled{opacity:.3;cursor:not-allowed}

  footer.foot{border-top:var(--line) solid var(--black);background:var(--black);color:var(--paper);padding:30px 0}
  footer .wrap{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between}
  footer .fdisplay{font-family:"Archivo Black";text-transform:uppercase;font-size:20px}
  footer .fdisplay span{color:var(--yellow)}
  footer .fsrc{font-family:"Poppins";font-weight:500;font-size:12px;opacity:.7}
  footer .fshapes{display:flex;gap:8px}
  footer .fshapes i{width:20px;height:20px;display:block}
</style>
</head>
<body>
<div id="app">

  <!-- LIBRARY -->
  <section id="library" class="view active">
    <header class="mast">
      <div class="mast-in">
        <div class="logo-mark" aria-hidden="true"></div>
        <div class="logo-txt">
          <div class="l1">Bauhaus Bücherei</div>
          <div class="l2">Form · Function · Fiction</div>
        </div>
        <div class="mast-shapes" aria-hidden="true"><div class="ms-r"></div><div class="ms-y"></div><div class="ms-b"></div></div>
      </div>
    </header>

    <div class="hero">
      <div class="hero-in">
        <div class="hero-txt">
          <h2>Read in <span class="k">primary</span> colour.</h2>
          <p>Fifteen public-domain works, ordered by the grid. Choose a category, choose a shape, start to read.</p>
        </div>
        <div class="hero-art" aria-hidden="true">
          <div class="circ"></div><div class="tri"></div><div class="sq"></div>
        </div>
      </div>
    </div>

    <div class="filterbar">
      <div class="filter-in" id="filters"></div>
    </div>

    <div class="wrap" style="padding-top:0;padding-bottom:0;max-width:none;padding-left:0;padding-right:0">
      <div class="grid" id="grid"></div>
    </div>

    <footer class="foot">
      <div class="wrap">
        <div class="fdisplay">BAUHAUS <span>BÜCHEREI</span></div>
        <div class="fsrc" id="src1"></div>
        <div class="fshapes" aria-hidden="true">
          <i style="background:var(--red);border-radius:50%"></i>
          <i style="background:var(--yellow)"></i>
          <i style="background:var(--blue);clip-path:polygon(50% 0,100% 100%,0 100%)"></i>
        </div>
      </div>
    </footer>
  </section>

  <!-- DETAIL -->
  <section id="detail" class="view">
    <header class="mast">
      <div class="mast-in">
        <div class="logo-mark" aria-hidden="true"></div>
        <div class="logo-txt">
          <div class="l1">Bauhaus Bücherei</div>
          <div class="l2">Form · Function · Fiction</div>
        </div>
        <div class="mast-shapes" aria-hidden="true"><div class="ms-r"></div><div class="ms-y"></div><div class="ms-b"></div></div>
      </div>
    </header>
    <div class="wrap">
      <div class="crumb"><button id="d-back">◀ Library</button></div>
      <div class="detail-grid">
        <div class="detail-cover" id="d-cover"></div>
        <div class="detail-body">
          <div class="detail-cat" id="d-cat"></div>
          <h2 id="d-title"></h2>
          <div class="detail-author" id="d-author"></div>
          <p class="detail-blurb" id="d-blurb"></p>
          <button class="startbtn" id="d-start">Start Reading <span class="arr"></span></button>
        </div>
      </div>
      <div class="toc">
        <div class="toc-h"><span class="sqm"></span> Contents</div>
        <div id="d-toc"></div>
      </div>
    </div>
  </section>

  <!-- READER -->
  <section id="reader" class="view">
    <div class="rd-bar">
      <div class="seg">
        <button class="rb solid" id="r-tolib">◀ Library</button>
        <button class="rb" id="r-tobook">Contents</button>
      </div>
      <div class="seg">
        <button class="rb" id="r-prev">◀ Prev</button>
        <select class="rd-jump" id="r-jump" aria-label="Jump to chapter"></select>
        <button class="rb" id="r-next">Next ▶</button>
      </div>
      <div class="seg fontctl">
        <button class="rb" id="r-dec" aria-label="Smaller text">A−</button>
        <button class="rb" id="r-inc" aria-label="Larger text">A+</button>
      </div>
    </div>
    <div class="rd-canvas">
      <article class="rd-paper">
        <div class="rd-kicker" id="r-kicker"></div>
        <h1 class="rd-title" id="r-ctitle"></h1>
        <div class="rd-of" id="r-of"></div>
        <div id="r-body"></div>
        <div class="rd-foot">
          <button id="r-fprev">◀ Previous</button>
          <button id="r-fnext">Next ▶</button>
        </div>
      </article>
    </div>
  </section>

</div>

<script src="../../data/books.js"></script>
<script>
(function(){
  var DATA = window.BOOKS;
  var PRIMS = ['var(--red)','var(--yellow)','var(--blue)','var(--black)'];

  // ---- state
  var state = { filter:'all', bookId:null, chapter:0 };

  // ---- helpers
  function el(id){return document.getElementById(id);}
  function catName(id){var c=DATA.categories.find(function(c){return c.id===id;});return c?c.name:id;}
  function bookById(id){return DATA.books.find(function(b){return b.id===id;});}
  function seed(str){var h=0;for(var i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))>>>0;}return h;}

  // ---- generative geometric cover
  function coverHTML(book, big){
    var s = seed(book.id);
    var bgs = ['var(--paper2)','var(--yellow)','var(--red)','var(--blue)'];
    var bg = bgs[s % bgs.length];
    var pal = PRIMS.filter(function(c){return c!==bg;});
    var shapes = '';
    // big circle
    var c1 = pal[s%pal.length];
    shapes += '<div class="shp" style="width:78%;aspect-ratio:1;border-radius:50%;background:'+c1+';left:'+(-10+(s%18))+'%;top:'+(8+(s%20))+'%"></div>';
    // square
    var c2 = pal[(s>>3)%pal.length];
    shapes += '<div class="shp" style="width:46%;aspect-ratio:1;background:'+c2+';right:'+(4+(s%14))+'%;bottom:'+(-6+(s%14))+'%"></div>';
    // triangle
    var c3 = pal[(s>>6)%pal.length];
    var ts = big?96:62;
    shapes += '<div class="shp" style="width:0;height:0;border-left:'+(ts*0.55)+'px solid transparent;border-right:'+(ts*0.55)+'px solid transparent;border-bottom:'+ts+'px solid '+c3+';left:'+(8+(s%30))+'%;bottom:'+(10+(s%22))+'%"></div>';
    // structural rules
    shapes += '<div class="cover-rule" style="top:30%"></div>';
    shapes += '<div class="cover-rule" style="left:38%;top:0;bottom:0;width:6px;height:auto"></div>';
    var titleColor = (bg==='var(--black)'||bg==='var(--blue)'||bg==='var(--red)')?'#fff':'var(--black)';
    return '<div class="cv" style="background:'+bg+'">'+shapes+
      '<div class="cover-title"><div class="ct" style="color:'+titleColor+';text-shadow:none">'+esc(book.title)+'</div></div></div>';
  }
  function esc(t){return (t+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  // strip Gutenberg _emphasis_ markers
  function clean(t){return (t+'').replace(/_/g,'');}

  // ---- LIBRARY render
  function renderFilters(){
    var f = el('filters');
    var html = '<div class="flabel">Filter</div>';
    html += '<button class="chip'+(state.filter==='all'?' on':'')+'" data-cat="all">All</button>';
    DATA.categories.forEach(function(c){
      var dot = c.id==='poetry'?'var(--yellow)':c.id==='scifi'?'var(--blue)':c.id==='mystery'?'var(--black)':c.id==='philosophy'?'var(--red)':'var(--blue)';
      html += '<button class="chip'+(state.filter===c.id?' on':'')+'" data-cat="'+c.id+'"><span class="dot" style="background:'+dot+';border-radius:'+(c.id==='fiction'?'50%':'0')+'"></span>'+esc(c.name)+'</button>';
    });
    f.innerHTML = html;
    f.querySelectorAll('.chip').forEach(function(ch){
      ch.addEventListener('click',function(){ state.filter=ch.getAttribute('data-cat'); renderFilters(); renderGrid(); });
    });
  }
  function renderGrid(){
    var g = el('grid');
    var list = DATA.books.filter(function(b){return state.filter==='all'||b.category===state.filter;});
    g.innerHTML = list.map(function(b){
      return '<div class="card" data-id="'+b.id+'" tabindex="0" role="button" aria-label="'+esc(b.title)+'">'+
        '<div class="cover">'+coverHTML(b,false)+'</div>'+
        '<div class="card-meta">'+
          '<div class="card-cat">'+esc(catName(b.category))+'</div>'+
          '<div class="card-title">'+esc(b.title)+'</div>'+
          '<div class="card-author">'+esc(b.author)+'</div>'+
          '<span class="card-words">'+b.chapters.length+' parts · '+b.words+' words</span>'+
        '</div></div>';
    }).join('');
    g.querySelectorAll('.card').forEach(function(card){
      var open=function(){openDetail(card.getAttribute('data-id'));};
      card.addEventListener('click',open);
      card.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();open();}});
    });
  }

  // ---- DETAIL
  function openDetail(id){
    state.bookId=id;
    var b=bookById(id);
    el('d-cover').innerHTML=coverHTML(b,true);
    el('d-cat').textContent=catName(b.category);
    el('d-title').textContent=b.title;
    el('d-author').textContent=b.author;
    el('d-blurb').textContent=b.blurb;
    var toc=el('d-toc');
    toc.innerHTML=b.chapters.map(function(ch,i){
      return '<div class="toc-item" data-i="'+i+'">'+
        '<span class="toc-num">'+(i+1)+'</span>'+
        '<span class="toc-title">'+esc(ch.title)+'</span>'+
        '<span class="toc-type">'+ch.type+'</span></div>';
    }).join('');
    toc.querySelectorAll('.toc-item').forEach(function(it){
      it.addEventListener('click',function(){openReader(id,parseInt(it.getAttribute('data-i'),10));});
    });
    show('detail');
  }

  // ---- READER
  function openReader(id,chap){
    state.bookId=id;state.chapter=chap;
    var b=bookById(id);
    var jump=el('r-jump');
    jump.innerHTML=b.chapters.map(function(ch,i){return '<option value="'+i+'">'+(i+1)+'. '+esc(ch.title)+'</option>';}).join('');
    renderChapter();
    show('reader');
  }
  function renderChapter(){
    var b=bookById(state.bookId);
    var ch=b.chapters[state.chapter];
    el('r-kicker').textContent=b.title+' — '+b.author;
    el('r-ctitle').textContent=ch.title;
    el('r-of').textContent='Part '+(state.chapter+1)+' of '+b.chapters.length+'  ·  '+ch.type.toUpperCase();
    var body=el('r-body');
    if(ch.type==='verse'){
      // group lines into stanzas on blank lines
      var html='<div class="verse">';var stanza='';
      ch.lines.forEach(function(l){
        if(l.trim()===''){ if(stanza){html+='<div class="stz">'+stanza+'</div>';stanza='';} }
        else { stanza+='<span class="ln">'+esc(clean(l))+'</span>'; }
      });
      if(stanza)html+='<div class="stz">'+stanza+'</div>';
      html+='</div>';
      body.innerHTML=html;
    } else {
      body.innerHTML='<div class="prose">'+ch.paragraphs.map(function(p){return '<p>'+esc(clean(p))+'</p>';}).join('')+'</div>';
    }
    el('r-jump').value=state.chapter;
    var first=state.chapter===0, last=state.chapter===b.chapters.length-1;
    el('r-prev').disabled=first; el('r-fprev').disabled=first;
    el('r-next').disabled=last; el('r-fnext').disabled=last;
    window.scrollTo(0,0);
    document.querySelector('.rd-canvas').scrollTop=0;
  }
  function navChap(d){
    var b=bookById(state.bookId);
    var n=state.chapter+d;
    if(n<0||n>=b.chapters.length)return;
    state.chapter=n;renderChapter();
  }
  // font size
  var sizes=[17,19,21,23,26,29];var sIdx=2;
  function applySize(){document.documentElement.style.setProperty('--reader-size',sizes[sIdx]+'px');}

  // ---- view switching
  function show(v){
    document.querySelectorAll('.view').forEach(function(s){s.classList.remove('active');});
    el(v).classList.add('active');
    window.scrollTo(0,0);
  }

  // ---- wire
  function init(){
    el('src1').textContent='Source: '+DATA.source;
    renderFilters();renderGrid();
    el('d-back').addEventListener('click',function(){show('library');});
    el('d-start').addEventListener('click',function(){openReader(state.bookId,0);});
    el('r-tolib').addEventListener('click',function(){show('library');});
    el('r-tobook').addEventListener('click',function(){openDetail(state.bookId);});
    el('r-prev').addEventListener('click',function(){navChap(-1);});
    el('r-next').addEventListener('click',function(){navChap(1);});
    el('r-fprev').addEventListener('click',function(){navChap(-1);});
    el('r-fnext').addEventListener('click',function(){navChap(1);});
    el('r-jump').addEventListener('change',function(e){state.chapter=parseInt(e.target.value,10);renderChapter();});
    el('r-inc').addEventListener('click',function(){if(sIdx<sizes.length-1){sIdx++;applySize();}});
    el('r-dec').addEventListener('click',function(){if(sIdx>0){sIdx--;applySize();}});
    document.addEventListener('keydown',function(e){
      if(!el('reader').classList.contains('active'))return;
      if(e.key==='ArrowLeft')navChap(-1);
      if(e.key==='ArrowRight')navChap(1);
    });
  }
  init();
})();
</script>
<script src="../nav-enhance.js"></script>
</body>
</html>
